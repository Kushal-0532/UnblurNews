services:
  - type: web
    name: unblur-api
    env: docker
    plan: free
    rootDir: unblur
    healthCheckPath: /health
    envVars:
      - key: NEWSAPI_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: MODEL_REPO_ID
        sync: false
      - key: HF_TOKEN
        sync: false
