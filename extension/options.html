<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>UnBlur — Settings</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 24px; max-width: 400px; }
    label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
    input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
    button { margin-top: 12px; padding: 8px 20px; background: #6366f1; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
    #status { margin-top: 10px; font-size: 13px; color: green; }
  </style>
</head>
<body>
  <h2 style="margin-bottom:20px">UnBlur Settings</h2>
  <label for="backend-url">Backend URL</label>
  <input id="backend-url" type="text" placeholder="http://localhost:8000" />
  <button id="btn-save">Save</button>
  <div id="status"></div>
  <script>
    const input  = document.getElementById("backend-url");
    const status = document.getElementById("status");

    chrome.storage.sync.get(["backendUrl"], (r) => {
      if (r.backendUrl) input.value = r.backendUrl;
    });

    document.getElementById("btn-save").addEventListener("click", () => {
      const url = input.value.trim().replace(/\/$/, "");
      chrome.storage.sync.set({ backendUrl: url }, () => {
        status.textContent = "Saved!";
        setTimeout(() => { status.textContent = ""; }, 2000);
      });
    });
  </script>
</body>
</html>
